description: >-
  Remote connection to a satellite instance - client (aka controller) side.
config:
  hostname:
    description: The remote agent's hostname to connect to.
    type: string
  port:
    description: The remote agent's port number to connect to.
    type: integer
    minimum: 1
    maximum: 65535
    default: 4129
provides:
  auth_token_provider:
    interface: auth_token_provider
    description: This interface can provide tokens for AutoCharge or Plug and Charge.
  energy:
    interface: energy
    description: This is the energy interface, providing an energy leaf in the energy supply tree.
  evse_manager:
    interface: evse_manager
    description: This interface controls the charging port.
  dc_external_derate:
    interface: dc_external_derate
    description: This interface provides the proxied DC external derating capabilities.
  display_message:
    interface: display_message
    description: This interface allows to forward display messages to the remote side.
  iso15118_extensions:
    interface: iso15118_extensions
    description: Forwards OCPP related ISO15118 stuff to the remote side.
  ocpp_data_transfer:
    interface: ocpp_data_transfer
    description: This interface allows to forward customer OCPP stuff to the remote side.
  rfid_token_provider:
    interface: auth_token_provider
    description: >-
      Use this interface for an RFID token provider on the remote side. The difference to the
      auth_token_provider interface above is, that here the provided id tokens are limited
      to the configured connector id if the incoming token does not yet include such an
      information. The connector id is derived from the module/interface mapping.
  satellite:
    interface: satellite
    description: This interface provides information/control for the satellite connection.
  system:
    interface: system
    description: This interface provides a proxied system interface.
  uk_random_delay:
    interface: uk_random_delay
    description: Forwards control over UK smart charging regulation random delay feature
requires:
  auth:
    interface: auth
    min_connections: 1
    max_connections: 1
  system:
    interface: system
    min_connections: 0
    max_connections: 1
metadata:
  license: https://opensource.org/license/gpl-3-0
  authors:
    - Michael Heimpold
